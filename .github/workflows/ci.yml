name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Clojure tooling
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: "1.12.214"
          clj-kondo: "2026.01.12"

      - name: Verify Docker is available
        run: docker info

      - name: Quality checks (lint + format + smoke)
        run: bb check

      - name: Integration tests
        run: bb test

      - name: Coverage report and threshold gate
        run: bb coverage

      - name: Performance regression check
        run: bb perf-check

      - name: Publish performance summaries
        if: always()
        run: |
          if [ -f target/perf/summary.md ]; then
            cat target/perf/summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
